name: CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published

jobs:
  windows:
    name: Windows Release (${{ matrix.arch }})
    runs-on: windows-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-pc-windows-msvc
          - arch: arm64
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npx tauri build --target ${{ matrix.target }}

      - name: Package portable Windows release
        env:
          WINDOWS_TARGET: ${{ matrix.target }}
          WINDOWS_ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: .\scripts\package-windows-release.ps1

      - name: Upload Windows installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | ForEach-Object {
            gh release upload "${{ github.event.release.tag_name }}" $_.FullName --clobber
          }

      - name: Upload Windows portable zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ github.event.release.tag_name }}" release/windows/StartYourPython-${{ github.event.release.tag_name }}-win-${{ matrix.arch }}.zip --clobber

  android:
    name: Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run build:mobile

      - name: Create Android shell
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Enable Android ABI split APKs
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              splits {
                  abi {
                      enable true
                      reset()
                      include 'arm64-v8a', 'x86_64'
                      universalApk false
                  }
              }
          }
          EOF

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Sign release APKs
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          KEYSTORE_PATH="$RUNNER_TEMP/start-your-python-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"

          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          OUTPUT_DIR="android/app/build/outputs/apk/release/signed"
          mkdir -p "$OUTPUT_DIR"

          find android/app/build/outputs/apk/release -maxdepth 1 -name 'app-*-release-unsigned.apk' -print | while read -r unsigned_apk; do
            abi="$(basename "$unsigned_apk" | sed -E 's/^app-(.*)-release-unsigned\.apk$/\1/')"
            aligned_apk="$RUNNER_TEMP/app-${abi}-release-aligned.apk"
            signed_apk="$OUTPUT_DIR/StartYourPython-${{ github.event.release.tag_name }}-android-${abi}-release.apk"

            "$BUILD_TOOLS_DIR/zipalign" -f -p 4 "$unsigned_apk" "$aligned_apk"
            "$BUILD_TOOLS_DIR/apksigner" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "$signed_apk" \
              "$aligned_apk"
            "$BUILD_TOOLS_DIR/apksigner" verify "$signed_apk"
          done

          test "$(find "$OUTPUT_DIR" -name '*.apk' | wc -l)" -eq 2

      - name: Upload Android APKs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" android/app/build/outputs/apk/release/signed/*.apk --clobber
