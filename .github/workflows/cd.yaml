name: CD

on:
  release:
    types:
      - published

jobs:
  windows:
    name: Windows Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri:bundle

      - name: Package portable Windows release
        shell: pwsh
        run: .\scripts\package-windows-release.ps1

      - name: Upload Windows installers to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | ForEach-Object {
            gh release upload "${{ github.event.release.tag_name }}" $_.FullName --clobber
          }

      - name: Upload Windows portable zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ github.event.release.tag_name }}" release/windows/*.zip --clobber

  android:
    name: Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build mobile web assets
        run: npm run build:mobile

      - name: Create Android shell
        run: npx cap add android

      - name: Sync Capacitor Android project
        run: npm run android:sync

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Android APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" android/app/build/outputs/apk/debug/app-debug.apk --clobber
