name: Bug Report / 缺陷反馈
description: Report a reproducible bug in the app / 提交可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        感谢你反馈问题。

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary / 问题概述
      description: Describe the issue clearly and concisely. / 请简要描述问题。
      placeholder: What went wrong? / 出现了什么问题？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: If possible, list the shortest steps to reproduce it. / 如方便，请提供最小复现步骤。
      placeholder: |
        1. Open ... / 打开 ...
        2. Click ... / 点击 ...
        3. See error ... / 出现 ...

  - type: input
    id: app-version
    attributes:
      label: App Version / 应用版本
      placeholder: e.g. 1.1.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      options:
        - Windows desktop
        - Android
        - Web preview
        - Other
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version / Python 版本
      description: If the issue involves running code. / 如果问题和运行代码有关，请填写。
      placeholder: e.g. Python 3.12.3

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this report. / 我已先搜索过现有 Issue。
        - label: I have removed sensitive information from logs and screenshots. / 我已移除日志和截图中的敏感信息。
