<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="960" height="520" rx="28" fill="#0F1827"/>
  <rect x="48" y="44" width="864" height="432" rx="24" fill="#152235" stroke="#243756"/>
  <rect x="84" y="86" width="356" height="344" rx="22" fill="#1B2B44"/>
  <rect x="496" y="86" width="380" height="344" rx="22" fill="#111B2A" stroke="#233754"/>
  <text x="118" y="132" fill="#EAF2FF" font-size="30" font-family="Arial">Windows setup</text>
  <text x="118" y="170" fill="#9CB3D5" font-size="18" font-family="Arial">1. Open python.org/downloads</text>
  <text x="118" y="212" fill="#9CB3D5" font-size="18" font-family="Arial">2. Choose the latest stable installer</text>
  <rect x="116" y="252" width="292" height="92" rx="16" fill="#26456F"/>
  <text x="146" y="292" fill="#FFFFFF" font-size="22" font-family="Arial">Add Python to PATH</text>
  <text x="146" y="322" fill="#D7E6FF" font-size="16" font-family="Arial">Tick this before Install Now</text>
  <circle cx="130" cy="292" r="14" fill="#4DB26A"/>
  <path d="M123 292L129 298L140 286" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="118" y="384" fill="#9CB3D5" font-size="18" font-family="Arial">3. Finish install and reopen terminal</text>
  <text x="534" y="132" fill="#EAF2FF" font-size="30" font-family="Arial">Verify in terminal</text>
  <rect x="534" y="168" width="304" height="180" rx="16" fill="#0B1220"/>
  <circle cx="564" cy="194" r="6" fill="#FF5F57"/>
  <circle cx="586" cy="194" r="6" fill="#FEBC2E"/>
  <circle cx="608" cy="194" r="6" fill="#28C840"/>
  <text x="560" y="238" fill="#84F0A3" font-size="24" font-family="Courier New">python --version</text>
  <text x="560" y="278" fill="#EAF2FF" font-size="22" font-family="Courier New">Python 3.x.x</text>
  <text x="560" y="318" fill="#84F0A3" font-size="24" font-family="Courier New">pip --version</text>
  <text x="534" y="386" fill="#9CB3D5" font-size="18" font-family="Arial">If both commands work, the environment is ready.</text>
</svg>
